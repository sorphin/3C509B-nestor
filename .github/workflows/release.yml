name: UploadRelease
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: open-watcom/setup-watcom@v1
      with:
        version: "1.9"
        target:  "dos"
    - run: |
        make
    - uses: softprops/action-gh-release@v3
      with:
        draft: true
        files: |
          3c509.com

